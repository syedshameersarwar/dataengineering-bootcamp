id: gcp_kv
namespace: zoomcamp

inputs:
  - id: gcp_project_id
    type: STRING
    required: true

  - id: gcp_location
    type: SELECT
    values:
      - US
      - europe-west2
    allowCustomValue: true
    defaults: US

  - id: gcp_bucket_name
    type: STRING
    required: true

  - id: gcp_bq_dataset
    type: STRING
    required: true

tasks:
  - id: gcp_project_id
    type: io.kestra.plugin.core.kv.Set
    namespace: zoomcamp
    key: GCP_PROJECT_ID
    kvType: STRING
    value: "{{ inputs.gcp_project_id }}"

  - id: gcp_location
    type: io.kestra.plugin.core.kv.Set
    key: GCP_LOCATION
    kvType: STRING
    value: "{{ inputs.gcp_location }}"

  - id: gcp_bucket_name
    type: io.kestra.plugin.core.kv.Set
    key: GCP_BUCKET_NAME
    kvType: STRING
    value:  "{{ inputs.gcp_bucket_name }}"
    
  - id: gcp_dataset
    type: io.kestra.plugin.core.kv.Set
    key: GCP_DATASET
    kvType: STRING
    value: "{{ inputs.gcp_bq_dataset }}"
